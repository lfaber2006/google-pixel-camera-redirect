name: Build and Sign Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Accept Android SDK Licenses
        run: yes | sdkmanager --licenses || true

      - name: Grant execute permission for gradlew
        run: chmod +x app/gradlew

      - name: Build Debug APK
        working-directory: ./app
        run: ./gradlew assembleDebug --stacktrace

      # This step signs the APK so the Pixel 10 Pro parser trusts the structure
      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/app/build/outputs/apk/debug
          signingKeyBase64: ${{ secrets.SIGNING_KEY }} # Optional: See note below
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "35.0.0"

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: pixel-camera-redirect-signed
          path: ${{ steps.sign_app.outputs.signedReleaseFile }}

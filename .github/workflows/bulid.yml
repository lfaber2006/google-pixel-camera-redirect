name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Accept Android SDK Licenses
        run: yes | sdkmanager --licenses || true

      - name: Grant execute permission for gradlew
        # We added 'app/' before gradlew to find it in the subfolder
        run: chmod +x app/gradlew

      - name: Build Debug APK
        # We set the 'working-directory' so it runs inside the app folder
        working-directory: ./app
        run: ./gradlew assembleDebug --stacktrace
        
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: pixel-camera-redirect-apk
          # Path updated to find the file inside the app subfolder structure
          path: app/app/build/outputs/apk/debug/*.apk
